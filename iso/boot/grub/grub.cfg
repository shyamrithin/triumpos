# ============================================================
# Triumph OS - GRUB Configuration
# File: iso/boot/grub/grub.cfg
# Description: Tells GRUB how to find and load the Triumph OS
#              kernel. This is the bootloader configuration.
# ============================================================

# How long GRUB waits before auto-booting (seconds)
set timeout=3

# Which menu entry to boot by default (0 = first)
set default=0

menuentry "Triumph OS" {
    multiboot2 /boot/triumpos.bin
    boot
}